<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MemoryChat — F1 prototype</title>
  <!--
    UI/UX PROTOTYPE ONLY (for design approval).
    React + Babel from CDN, no build step. Replies are MOCKED (no backend).
    The production F1 frontend is a single static HTML file (no React) — see PRD.
  -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root { --blue:#2563eb; --gray:#f1f3f5; --line:#e5e7eb; --muted:#6b7280; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, sans-serif; color:#111; background:#fafafa; }
    .app { max-width: 680px; margin: 0 auto; height: 100vh; display:flex; flex-direction:column; background:#fff; border-left:1px solid var(--line); border-right:1px solid var(--line); }
    header { padding: 14px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
    header h1 { font-size: 1.05rem; margin:0; }
    .badge { font-size:.7rem; padding:.15rem .5rem; border-radius:999px; background:var(--gray); color:var(--muted); }
    .feed { flex:1; overflow-y:auto; padding: 18px 20px; display:flex; flex-direction:column; gap:12px; }
    .row { display:flex; }
    .row.user { justify-content:flex-end; }
    .bubble { max-width: 78%; padding: 10px 13px; border-radius: 14px; line-height:1.4; white-space:pre-wrap; word-wrap:break-word; }
    .user .bubble { background:var(--blue); color:#fff; border-bottom-right-radius:4px; }
    .model .bubble { background:var(--gray); color:#111; border-bottom-left-radius:4px; }
    .error .bubble { background:#fee2e2; color:#991b1b; }
    .typing { display:flex; gap:4px; padding:4px 2px; }
    .typing span { width:6px; height:6px; border-radius:50%; background:var(--muted); animation: blink 1.2s infinite; }
    .typing span:nth-child(2){ animation-delay:.2s; } .typing span:nth-child(3){ animation-delay:.4s; }
    @keyframes blink { 0%,80%,100%{ opacity:.2 } 40%{ opacity:1 } }
    form { display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--line); }
    input[type=text] { flex:1; padding:11px 14px; border:1px solid var(--line); border-radius:10px; font-size:.95rem; outline:none; }
    input[type=text]:focus { border-color:var(--blue); }
    button { padding:0 18px; border:none; border-radius:10px; background:var(--blue); color:#fff; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // MOCK backend — stands in for POST /chat {message} -> {reply}.
    // Real F1 replaces this with a fetch to the FastAPI + Gemini endpoint.
    function mockReply(text) {
      const t = text.toLowerCase();
      if (t.includes("capital") && t.includes("france")) return "Paris.";
      if (t.includes("hello") || t.includes("hi")) return "Hey! What can I help with?";
      return `(prototype reply) You said: "${text}". The real F1 sends this to Gemini 2.5 Flash.`;
    }

    function Feed({ messages, pending }) {
      const ref = useRef(null);
      useEffect(() => { ref.current?.scrollTo(0, ref.current.scrollHeight); }, [messages, pending]);
      return (
        <div className="feed" ref={ref}>
          {messages.map((m, i) => (
            <div key={i} className={`row ${m.role}`}>
              <div className="bubble">{m.text}</div>
            </div>
          ))}
          {pending && (
            <div className="row model">
              <div className="bubble"><div className="typing"><span/><span/><span/></div></div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [messages, setMessages] = useState([
        { role: "model", text: "Hi! Ask me anything." },
      ]);
      const [draft, setDraft] = useState("");
      const [pending, setPending] = useState(false);

      async function send(e) {
        e.preventDefault();
        const text = draft.trim();
        if (!text || pending) return;
        setMessages(m => [...m, { role: "user", text }]);
        setDraft("");
        setPending(true);
        // Simulate network + Gemini latency.
        await new Promise(r => setTimeout(r, 700));
        setMessages(m => [...m, { role: "model", text: mockReply(text) }]);
        setPending(false);
      }

      return (
        <div className="app">
          <header>
            <h1>MemoryChat</h1>
            <span className="badge">F1 · basic chat</span>
          </header>
          <Feed messages={messages} pending={pending} />
          <form onSubmit={send}>
            <input
              type="text" value={draft} placeholder="type a message…"
              onChange={e => setDraft(e.target.value)} autoFocus
            />
            <button type="submit" disabled={!draft.trim() || pending}>Send</button>
          </form>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
